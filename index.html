<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Spendly</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #0F0F14;
  --surface: #1A1A24;
  --surface2: #22222F;
  --surface3: #2A2A3A;
  --border: rgba(255,255,255,0.07);
  --t1: #F0F0FF;
  --t2: rgba(240,240,255,0.7);
  --t3: rgba(240,240,255,0.4);
  --t4: rgba(240,240,255,0.15);
  --blue: #6366F1;
  --blue2: #818CF8;
  --green: #10B981;
  --purple: #8B5CF6;
  --red: #EF4444;
  --yellow: #F59E0B;
  --sep: rgba(255,255,255,0.06);
  --safe-b: env(safe-area-inset-bottom);
  --tab-h: 72px;
  --radius: 20px;
}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent;margin:0;padding:0;}
html,body{height:100%;overflow:hidden;}
body{
  font-family:'Inter',system-ui,sans-serif;
  background:var(--bg);
  color:var(--t1);
  display:flex;
  justify-content:center;
}
#app{
  width:100%;
  max-width:430px;
  height:100%;
  position:relative;
  overflow:hidden;
  background:var(--bg);
}

/* ── SIGN IN ─────────────────────────────────────────────────────────────── */
#signin-screen{
  display:none;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  height:100%;
  padding:40px 28px;
  text-align:center;
  background:radial-gradient(ellipse at 50% 0%, rgba(99,102,241,0.18) 0%, transparent 70%);
}
.signin-logo{font-size:72px;margin-bottom:20px;filter:drop-shadow(0 8px 24px rgba(99,102,241,0.5));}
.signin-title{font-size:36px;font-weight:800;letter-spacing:-1px;margin-bottom:8px;}
.signin-sub{font-size:16px;color:var(--t3);line-height:1.5;margin-bottom:56px;}
.google-btn{
  background:#fff;color:#1a1a1a;border:none;
  border-radius:14px;padding:16px 28px;
  font-size:16px;font-weight:600;
  width:100%;max-width:300px;
  cursor:pointer;display:flex;align-items:center;justify-content:center;gap:12px;
  transition:transform .15s, box-shadow .15s;
  box-shadow:0 4px 20px rgba(0,0,0,0.4);
}
.google-btn:active{transform:scale(0.96);}

/* ── SETUP SCREEN ───────────────────────────────────────────────────────── */
#setup-screen{
  display:none;flex-direction:column;align-items:center;justify-content:center;
  height:100%;padding:28px;
}
.setup-card{
  background:var(--surface);border:1px solid var(--border);
  border-radius:24px;padding:32px;width:100%;
}
.setup-card h2{font-size:24px;font-weight:700;margin-bottom:10px;}
.setup-card p{color:var(--t3);font-size:14px;line-height:1.6;margin-bottom:24px;}
.setup-input{
  width:100%;padding:14px 16px;
  background:var(--surface2);border:1px solid var(--border);
  border-radius:12px;color:var(--t1);font-size:16px;
  outline:none;margin-bottom:10px;font-family:inherit;
  transition:border-color .2s;
}
.setup-input:focus{border-color:var(--blue);}
.err-text{color:var(--red);font-size:13px;min-height:20px;margin-bottom:10px;}
.setup-btn{
  background:linear-gradient(135deg,var(--blue),var(--purple));
  color:#fff;border:none;border-radius:12px;
  padding:15px;width:100%;font-size:16px;font-weight:700;
  cursor:pointer;font-family:inherit;
}

/* ── MAIN APP ─────────────────────────────────────────────────────────────── */
#main-app{
  display:none;flex-direction:column;height:100%;
}
#tab-content{
  flex:1;overflow-y:auto;padding-bottom:calc(var(--tab-h) + 20px + var(--safe-b));
  scroll-behavior:smooth;
}
#tab-content::-webkit-scrollbar{display:none;}

/* ── PAGE HEADER ──────────────────────────────────────────────────────────── */
.page-header{
  display:flex;align-items:center;justify-content:space-between;
  padding:56px 20px 8px 20px;
}
.header-left { display: flex; align-items: center; gap: 12px; }
.menu-btn {
    background: var(--surface2); border: 1px solid var(--border);
    color: var(--t2); border-radius: 10px; width: 38px; height: 38px;
    display: flex; align-items: center; justify-content: center;
    font-size: 20px; cursor: pointer; transition: background .2s;
}
.page-title{font-size:32px;font-weight:800;letter-spacing:-0.8px;color:var(--t1);}
.header-right { display: flex; align-items: center; gap: 8px; }
.refresh-btn{
  background:var(--surface2);border:1px solid var(--border);
  color:var(--t2);border-radius:10px;width:38px;height:38px;
  display:flex;align-items:center;justify-content:center;
  font-size:18px;cursor:pointer;transition:background .2s;
}
/* ── FILTERS & SEARCH ───────────────────────────────────────────────────── */
#filter-container {
    max-height: 0;
    overflow: hidden;
    transition: max-height 0.4s cubic-bezier(0.32,0.72,0,1);
    background: var(--surface);
    border-bottom: 1px solid var(--border);
}
#filter-container.show {
    max-height: 500px; /* Increased for dropdown */
}
.search-group {
    padding: 12px 16px 8px;
    border-bottom: 1px solid var(--sep);
}
.search-input {
    width: 100%;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 10px 14px;
    color: var(--t1);
    font-size: 15px;
    font-family: inherit;
    outline: none;
}
.filter-tabs {
  display: flex;
  gap: 12px;
  padding: 12px 16px 8px;
  border-bottom: 1px solid var(--sep);
}
.filter-tab-btn {
  background: var(--surface2);
  border: 1px solid var(--border);
  color: var(--t2);
  padding: 8px 16px;
  border-radius: 12px;
  font-size: 13px;
  font-weight: 700;
  cursor: pointer;
  display: flex;
  align-items: center;
  gap: 6px;
}
.filter-tab-btn.active {
  background: var(--surface3);
  border-color: var(--blue);
  color: var(--blue2);
}

.date-range-section, .category-select-section {
    display: none;
    padding: 12px 16px;
}
.date-range-section.active, .category-select-section.active {
    display: block;
}

.date-range-inputs {
    display: flex;
    gap: 8px;
    margin-bottom: 12px;
}
.date-input-group {
    flex: 1;
}
.date-input-group label {
    display: block;
    font-size: 10px;
    font-weight: 700;
    color: var(--t3);
    text-transform: uppercase;
    margin-bottom: 4px;
}
.date-picker {
    width: 100%;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 8px;
    color: var(--t1);
    font-family: inherit;
    font-size: 13px;
    outline: none;
}

/* Multi-select Dropdown Style */
.multi-select-dropdown {
    max-height: 200px;
    overflow-y: auto;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 12px;
}
.multi-select-item {
    padding: 10px 14px;
    display: flex;
    align-items: center;
    gap: 12px;
    cursor: pointer;
    border-bottom: 1px solid var(--sep);
    transition: background 0.2s;
}
.multi-select-item:last-child { border-bottom: none; }
.multi-select-item:hover { background: var(--surface3); }
.multi-select-item input {
    width: 18px;
    height: 18px;
    accent-color: var(--blue);
}
.multi-select-item .label {
    font-size: 14px;
    color: var(--t1);
    font-weight: 500;
}
.multi-select-item.all {
    background: var(--surface3);
    font-weight: 700;
}

.refresh-btn:active{background:var(--surface3);}

/* ── CHARTS ─────────────────────────────────────────────────────────────── */
.chart-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 20px;
    margin: 12px 16px 20px;
}
.chart-container {
    height: 200px;
    position: relative;
    margin-bottom: 16px;
}
.chart-legend {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 8px;
}
.legend-item {
    display: flex;
    align-items: center;
    gap: 8px;
    font-size: 11px;
    color: var(--t3);
    overflow: hidden;
}
.legend-color {
    width: 8px;
    height: 8px;
    border-radius: 2px;
    flex-shrink: 0;
}
.legend-label {
    flex: 1;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
}
.legend-val {
    font-weight: 700;
    color: var(--t2);
}

/* ── LIST & SWIPE ───────────────────────────────────────────────────────── */
.date-section{padding:0 16px;margin-bottom:24px;}
.date-label{
  font-size: 12px; font-weight: 800; color: var(--t3);
  text-transform: uppercase; letter-spacing: 1px;
  padding: 0 4px; margin-bottom: 10px;
  display: flex; justify-content: space-between; align-items: center;
}
.list-card{
  background: var(--surface); border-radius: var(--radius);
  border: 1px solid var(--border); overflow: hidden;
}
.item-wrapper {
  position: relative;
  overflow: hidden;
}
.swipe-actions {
  position: absolute; inset:0; display:flex; 
  align-items:center; color: #fff; font-weight:700; font-size:14px;
}
.swipe-action-left { 
  background: var(--red); width: 100%; display: flex; 
  justify-content: flex-end; align-items: center; padding-right: 24px;
}
.swipe-action-right { 
  background: var(--blue); width: 100%; display: flex; 
  justify-content: flex-start; align-items: center; padding-left: 24px;
}
.list-item{
  display: flex; align-items: center; gap: 14px;
  padding: 14px 16px; cursor: pointer;
  background: var(--surface);
  transition: transform 0.2s cubic-bezier(0.18, 0.89, 0.32, 1.28);
  position: relative; z-index: 10;
}
.list-item:not(.last){border-bottom:1px solid var(--sep);}
.list-item:active{background:var(--surface2);}
.item-icon{
  width:44px;height:44px;border-radius:13px;
  background:var(--surface2);border:1px solid var(--border);
  display:flex;align-items:center;justify-content:center;
  font-size:20px;flex-shrink:0;
}
.item-body{flex:1;min-width:0;}
.item-name{font-size:15px;font-weight:600;color:var(--t1);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.item-sub{font-size:12px;color:var(--t3);margin-top:2px;}
.item-right{display:flex;align-items:center;gap:6px;flex-shrink:0;}
.amt-expense{font-size:15px;font-weight:700;color:var(--red);}
.amt-income{font-size:15px;font-weight:700;color:var(--green);}
.amt-mandatory{font-size:15px;font-weight:700;color:var(--purple);}
.item-chevron{font-size:18px;color:var(--t4);}

.empty-state{
  text-align:center;padding:60px 20px;
  color:var(--t3);font-size:15px;line-height:1.6;
}
.empty-icon{font-size:48px;margin-bottom:12px;}
.empty-sub{font-size:13px;margin-top:4px;color:var(--t4);}

/* ── TAB BAR ──────────────────────────────────────────────────────────────── */
.tab-bar{
  position:absolute;bottom:0;left:0;right:0;
  height:calc(var(--tab-h) + var(--safe-b));
  background:rgba(15,15,20,0.85);
  backdrop-filter:blur(24px);-webkit-backdrop-filter:blur(24px);
  border-top:1px solid var(--border);
  display:flex;justify-content:space-around;align-items:center;
  padding-bottom:var(--safe-b);
  z-index:200;
}
.tab-btn{
  flex:1;display:flex;flex-direction:column;align-items:center;
  gap:4px;border:none;background:none;
  color:var(--t4);font-size:10px;font-weight:600;
  cursor:pointer;font-family:inherit;padding:8px 0;
  transition:color .2s;letter-spacing:0.3px;
}
.tab-btn.active{color:var(--blue2);}
.tab-btn svg{width:22px;height:22px;fill:currentColor;}

/* ── FAB ──────────────────────────────────────────────────────────────────── */
#fab{
  position:absolute;bottom:calc(var(--tab-h) + 14px + var(--safe-b));right:18px;
  width:52px;height:52px;border-radius:16px;
  background:linear-gradient(135deg,var(--blue),var(--purple));
  display:flex;align-items:center;justify-content:center;
  box-shadow:0 8px 24px rgba(99,102,241,0.45);
  cursor:pointer;z-index:190;color:#fff;font-size:26px;font-weight:300;
  transition:transform .15s,box-shadow .15s;user-select:none;
}
#fab:active{transform:scale(0.92);box-shadow:0 4px 12px rgba(99,102,241,0.3);}

/* ── LOADER ───────────────────────────────────────────────────────────────── */
#loader{
  display:none;position:fixed;inset:0;
  background:rgba(0,0,0,0.55);backdrop-filter:blur(6px);
  z-index:2000;justify-content:center;align-items:center;
}
.spinner{
  width:40px;height:40px;border-radius:50%;
  border:3px solid rgba(255,255,255,0.15);
  border-top-color:var(--blue2);
  animation:spin .7s linear infinite;
}
@keyframes spin{to{transform:rotate(360deg);}}

/* ── TOAST ────────────────────────────────────────────────────────────────── */
.toast{
  position:fixed;bottom:calc(var(--tab-h) + var(--safe-b) + 16px);
  left:50%;transform:translateX(-50%) translateY(20px);
  background:var(--surface2);color:var(--t1);
  border:1px solid var(--border);
  padding:11px 22px;border-radius:100px;
  font-size:14px;font-weight:500;
  z-index:3000;opacity:0;transition:opacity .3s,transform .3s;
  white-space:nowrap;pointer-events:none;
  box-shadow:0 8px 32px rgba(0,0,0,0.5);
}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0);}
.toast-error{background:rgba(239,68,68,0.15);border-color:rgba(239,68,68,0.3);color:#FCA5A5;}

/* ── BOTTOM SHEET ─────────────────────────────────────────────────────────── */
#sheet-overlay{
  display:none;position:fixed;inset:0;
  background:rgba(0,0,0,0.6);backdrop-filter:blur(4px);
  z-index:500;opacity:0;transition:opacity .3s;
}
#sheet-overlay.show{display:block;opacity:1;}
#bottom-sheet{
  position:fixed;bottom:0;left:0;right:0;max-width:430px;margin:0 auto;
  background:var(--surface);border-radius:24px 24px 0 0;
  border-top:1px solid var(--border);
  z-index:600;padding:8px 16px calc(32px + var(--safe-b));
  transform:translateY(100%);transition:transform .4s cubic-bezier(0.32,0.72,0,1);
  max-height:92vh;overflow-y:auto;
}
#bottom-sheet::-webkit-scrollbar{display:none;}
#bottom-sheet.show{transform:translateY(0);}
.sheet-handle{width:36px;height:4px;background:var(--t4);border-radius:2px;margin:0 auto 16px;}
.sheet-header{
  display:flex;justify-content:space-between;align-items:center;
  margin-bottom:20px;padding:0 4px;
}
.sheet-header button{
  background:none;border:none;color:var(--blue2);
  font-size:16px;font-weight:600;cursor:pointer;font-family:inherit;padding:4px 0;
}
#sheet-title{font-size:17px;font-weight:700;color:var(--t1);}

/* ── FORM ─────────────────────────────────────────────────────────────────── */
.form-group{
  background:var(--surface2);border-radius:14px;
  border:1px solid var(--border);padding:12px 16px;
  margin-bottom:10px;transition:border-color .2s;
}
.form-group:focus-within{border-color:rgba(99,102,241,0.5);}
.form-group label{
  display:block;font-size:10px;font-weight:700;
  color:var(--t3);text-transform:uppercase;letter-spacing:.7px;margin-bottom:4px;
}
.form-group input,.form-group select{
  width:100%;background:none;border:none;outline:none;
  color:var(--t1);font-size:16px;font-family:inherit;padding:2px 0;
}
.form-group select option{background:var(--surface2);}
.amount-group{text-align:center;padding:16px;}
.amount-input{
  font-size:44px!important;font-weight:800!important;
  letter-spacing:-1.5px;text-align:center;
  width:100%;
}
.amount-input::placeholder{color:var(--t4);}
.tappable{cursor:pointer;user-select:none;}
.form-value{font-size:16px;color:var(--t1);padding:2px 0;}
.toggle-row{display:flex;align-items:center;justify-content:space-between;flex-direction:row;}
.toggle-row label:first-child{font-size:10px;font-weight:700;color:var(--t3);text-transform:uppercase;letter-spacing:.7px;}
.toggle{position:relative;display:inline-block;width:46px;height:26px;}
.toggle input{opacity:0;width:0;height:0;}
.toggle-track{
  position:absolute;inset:0;background:var(--surface3);
  border-radius:13px;transition:background .2s;cursor:pointer;
}
.toggle-track::before{
  content:'';position:absolute;left:3px;top:3px;
  width:20px;height:20px;background:#fff;border-radius:50%;
  transition:transform .2s;
}
.toggle input:checked + .toggle-track{background:var(--blue);}
.toggle input:checked + .toggle-track::before{transform:translateX(20px);}
.delete-btn{
  width:100%;margin-top:8px;padding:15px;
  background:rgba(239,68,68,0.1);border:1px solid rgba(239,68,68,0.2);
  border-radius:14px;color:var(--red);font-size:16px;font-weight:600;
  cursor:pointer;font-family:inherit;transition:background .2s;
}
.delete-btn:active{background:rgba(239,68,68,0.2);}

/* ── ANALYTICS ────────────────────────────────────────────────────────────── */
.seg-control{
  display:flex;background:var(--surface2);
  border:1px solid var(--border);border-radius:12px;
  margin:4px 16px 20px;padding:3px;gap:2px;
}
.seg{
  flex:1;padding:7px 4px;border-radius:9px;
  font-size:11px;font-weight:700;text-align:center;
  cursor:pointer;color:var(--t3);transition:all .2s;
  white-space:nowrap;
}
.seg-active{background:var(--surface3);color:var(--blue2);box-shadow:0 1px 4px rgba(0,0,0,0.3);}
.an-card{
  background:var(--surface);border:1px solid var(--border);
  border-radius:var(--radius);padding:20px;margin:0 16px 16px;
}
.an-card-title{font-size:14px;font-weight:700;color:var(--t2);margin-bottom:14px;}
.bar-row{margin-bottom:14px;}
.bar-row:last-child{margin-bottom:0;}
.bar-meta{display:flex;justify-content:space-between;margin-bottom:6px;}
.bar-label{font-size:13px;font-weight:600;color:var(--t2);}
.bar-amount{font-size:13px;font-weight:700;color:var(--t1);}
.bar-track{height:8px;background:var(--surface2);border-radius:4px;overflow:hidden;}
.bar-fill{height:100%;border-radius:4px;transition:width .6s cubic-bezier(0.32,0.72,0,1);}
.health-bar-bg{height:10px;background:var(--surface2);border-radius:5px;overflow:hidden;margin:10px 0;}
.health-bar-fill{height:100%;border-radius:5px;transition:width .6s ease;}
.an-hint{font-size:12px;color:var(--t3);margin-top:8px;}
.kpi-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin:0 16px 20px;padding:0;}
.kpi-card{background:var(--surface);border:1px solid var(--border);border-radius:16px;padding:16px;}
.kpi-label{font-size:10px;font-weight:700;color:var(--t3);text-transform:uppercase;letter-spacing:.5px;margin-bottom:6px;}
.kpi-val{font-size:18px;font-weight:800;color:var(--t1);}
.an-grid{display:grid;grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); gap: 12px; margin: 0 16px 20px;}
.an-stat-card{
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 18px; padding: 18px; display: flex; flex-direction: column;
}
.an-stat-label{font-size:11px; font-weight:700; color:var(--t3); margin-bottom:8px;}
.an-stat-val{font-size:20px; font-weight:800; color:var(--t1);}
.an-stat-sub{font-size:11px; color:var(--t4); margin-top:4px;}


/* ── CATEGORY PICKER ──────────────────────────────────────────────────────── */
#cat-picker{
  position:fixed;inset:0;background:var(--surface);z-index:800;
  display:none;flex-direction:column;
  transform:translateY(100%);transition:transform .35s cubic-bezier(0.32,0.72,0,1);
  max-width:430px;margin:0 auto;
}
#cat-picker.show{transform:translateY(0);}
.picker-header{
  display:flex;align-items:center;gap:12px;
  padding:56px 16px 12px;border-bottom:1px solid var(--border);
  background:var(--surface);
}
.cat-search-box{
  flex:1;background:var(--surface2);border:1px solid var(--border);
  border-radius:12px;padding:10px 14px;display:flex;align-items:center;gap:8px;
}
.cat-search-box input{
  flex:1;background:none;border:none;outline:none;
  font-size:16px;color:var(--t1);font-family:inherit;
}
.cancel-btn{background:none;border:none;color:var(--blue2);font-size:16px;font-weight:600;cursor:pointer;font-family:inherit;padding:4px 0;}
#picker-body{flex:1;overflow-y:auto;padding:8px 0 32px;}
#picker-body::-webkit-scrollbar{display:none;}
.cat-group{
  font-size:11px;font-weight:700;color:var(--t3);
  text-transform:uppercase;letter-spacing:.6px;
  padding:16px 20px 8px;
}
.cat-item{
  padding:14px 20px;font-size:16px;color:var(--t1);cursor:pointer;
  transition:background .15s;display:flex;align-items:center;gap:10px;
  border-bottom:1px solid var(--sep);
}
.cat-item:active{background:var(--surface2);}
.cat-empty{text-align:center;padding:48px 20px;color:var(--t3);font-size:15px;line-height:1.8;}
.add-cat-btn{
  background:linear-gradient(135deg,var(--blue),var(--purple));
  color:#fff;border:none;border-radius:10px;
  padding:10px 24px;font-size:14px;font-weight:700;
  cursor:pointer;font-family:inherit;margin-top:8px;
}
/* ── SIDEBAR ─────────────────────────────────────────────────────────────── */
#sidebar-overlay{
  position:fixed;inset:0;background:rgba(0,0,0,0.6);
  backdrop-filter:blur(4px);z-index:900;display:none;opacity:0;transition:opacity .3s;
}
#sidebar-overlay.show{display:block;opacity:1;}
#sidebar{
  position:fixed;top:0;left:0;bottom:0;width:280px;
  background:var(--bg);border-right:1px solid var(--border);
  z-index:1000;transform:translateX(-100%);transition:transform .3s cubic-bezier(0.32,0.72,0,1);
  display:flex;flex-direction:column;padding:56px 0 32px;
}
#sidebar.show{transform:translateX(0);}
.side-header{padding:0 20px 20px; border-bottom:1px solid var(--sep); margin-bottom:12px; display:flex; align-items:center; justify-content:space-between;}
.side-title{font-size:22px;font-weight:800;color:var(--t1);}
.side-content{flex:1;overflow-y:auto;padding:0 12px;}
.side-item{
  display:flex;align-items:center;gap:12px;padding:12px 14px;
  border-radius:12px;color:var(--t2);font-size:14px;font-weight:500;
  cursor:pointer;transition:background .2s;
}
.side-item.active { background: var(--surface2); color: var(--blue2); }
.side-item:active{background:var(--surface2);color:var(--t1);}
.side-item-icon{font-size:18px;opacity:0.8; width: 24px; text-align: center;}
.side-label{font-size:10px;font-weight:700;color:var(--t3);text-transform:uppercase;letter-spacing:1px;padding:24px 20px 8px; border-top: 1px solid var(--sep); margin-top: 10px;}
.side-label:first-child { border-top: none; margin-top: 0; }
.add-custom-cat{ display: none; } /* Hidden by default, moved to Account */

.cat-manage-view {
  position: fixed; inset: 0; background: var(--bg); z-index: 1200;
  display: none; flex-direction: column; padding-top: 40px;
}
.cat-manage-view.show { display: flex; }
.cat-manage-header { padding: 20px; display: flex; align-items: center; justify-content: space-between; border-bottom: 1px solid var(--border); }

/* ── CHARTS ─────────────────────────────────────────────────────────────── */
.chart-container {
    height: 240px;
    margin: 20px 0;
    position: relative;
}
.chart-legend {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 12px;
    margin-top: 20px;
}
.legend-item {
    display: flex;
    align-items: center;
    gap: 8px;
    font-size: 12px;
    color: var(--t2);
}
.legend-color {
    width: 12px;
    height: 12px;
    border-radius: 3px;
}
</style>
</head>
<body>
<div id="app">

  <!-- Sign In -->
  <div id="signin-screen">
    <div class="signin-logo">💸</div>
    <h1 class="signin-title">Spendly</h1>
    <p class="signin-sub">Your personal finance tracker.<br>Syncs live with Google Sheets.</p>
    <button class="google-btn" onclick="handleSignIn()">
      <svg width="20" height="20" viewBox="0 0 24 24">
        <path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/>
        <path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/>
        <path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66-2.84z"/>
        <path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/>
      </svg>
      Sign in with Google
    </button>
  </div>

  <!-- Setup -->
  <div id="setup-screen">
    <div class="setup-card">
      <h2>Connect Your Sheet</h2>
      <p>Paste your Google Sheet ID or URL. Your sheet must have tabs named ED, ID, and MED.</p>
      <input type="text" id="sheet-id-input" class="setup-input" placeholder="Sheet ID or Google Sheets URL">
      <div id="setup-error" class="err-text"></div>
      <button class="setup-btn" onclick="validateSheet()">Connect Sheet →</button>
    </div>
  </div>

  <!-- Main App -->
  <div id="main-app">
    <div id="filter-container">
      <div class="search-group">
        <input type="text" id="global-search" class="search-input" placeholder="Search description..." oninput="handleSearch(this.value)">
      </div>
      <div id="filter-tab-bar" class="filter-tabs"></div>
      <div id="filter-options-content"></div>
    </div>
    <div id="tab-content"></div>

    <!-- FAB -->
    <div id="fab" onclick="showAddSheet()">+</div>

    <!-- Tab Bar -->
    <nav class="tab-bar">
      <button class="tab-btn" data-tab="expenses" onclick="switchTab('expenses')">
        <svg viewBox="0 0 24 24"><path d="M19 5H5a3 3 0 00-3 3v8a3 3 0 003 3h14a3 3 0 003-3V8a3 3 0 00-3-3zM7 15h3a1 1 0 000-2H7a1 1 0 000 2zm0-4h10a1 1 0 000-2H7a1 1 0 000 2z"/></svg>
        Expenses
      </button>
      <button class="tab-btn" data-tab="mandatory" onclick="switchTab('mandatory')">
        <svg viewBox="0 0 24 24"><path d="M19 3H5c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h14c1.1 0 2-.9 2-2V5c0-1.1-.9-2-2-2zm0 16H5V5h14v14zM7 10h2v7H7zm4-3h2v10h-2zm4 6h2v4h-2z"/></svg>
        Mandatory
      </button>
      <button class="tab-btn" data-tab="income" onclick="switchTab('income')">
        <svg viewBox="0 0 24 24"><path d="M11.8 10.9c-2.27-.59-3-1.2-3-2.15 0-1.09 1.01-1.85 2.7-1.85 1.78 0 2.44.85 2.5 2.1h2.21c-.07-1.72-1.12-3.3-3.21-3.81V3h-3v2.16c-1.94.42-3.5 1.68-3.5 3.61 0 2.31 1.91 3.46 4.7 4.13 2.5.6 3 1.48 3 2.41 0 .69-.49 1.79-2.7 1.79-2.06 0-2.87-.92-2.98-2.1h-2.2c.12 2.19 1.76 3.42 3.68 3.83V21h3v-2.15c1.95-.37 3.5-1.5 3.5-3.55 0-2.84-2.43-3.81-4.7-4.4z"/></svg>
        Income
      </button>
    </nav>
  </div>

  <!-- Bottom Sheet Overlay -->
  <div id="sheet-overlay" onclick="closeSheet()"></div>
  <div id="bottom-sheet">
    <div class="sheet-handle"></div>
    <div class="sheet-header">
      <button onclick="closeSheet()">Cancel</button>
      <span id="sheet-title">New Expense</span>
      <button onclick="saveEntry()">Save</button>
    </div>
    <div id="form-body"></div>
    <button id="delete-btn" class="delete-btn" onclick="deleteEntry()" style="display:none;">Delete Entry</button>
  </div>

  <!-- Category Picker -->
  <div id="cat-picker">
    <div class="picker-header">
      <button class="cancel-btn" onclick="closeCategoryPicker()">Cancel</button>
      <div class="cat-search-box">
        <span>🔍</span>
        <input type="text" id="cat-search" placeholder="Search categories…">
      </div>
    </div>
    <div id="picker-body"></div>
  </div>

  <!-- Sidebar UI -->
  <div id="sidebar-overlay" onclick="toggleSidebar(false)"></div>
  <div id="sidebar">
    <div class="side-header">
      <div class="side-title">Spendly</div>
    </div>
    <div class="side-content" id="sidebar-categories">
      <!-- Navigation & Account items -->
    </div>
  </div>

  <!-- Category Management View -->
  <div id="cat-manage-view" class="cat-manage-view">
    <div class="cat-manage-header">
      <button class="cancel-btn" onclick="toggleCategoryManage(false)">← Back</button>
      <div class="side-title" style="font-size:18px;">Manage Categories</div>
      <div style="width:40px;"></div>
    </div>
    <div id="cat-manage-list" style="flex:1; overflow-y:auto; padding: 20px;"></div>
    <div style="padding: 20px; border-top: 1px solid var(--border);">
      <button class="setup-btn" onclick="promptAddCategory()">+ Add New Category</button>
    </div>
  </div>

  <!-- Loader -->
  <div id="loader"><div class="spinner"></div></div>
</div>

<script src="app.js"></script>
</body>
</html>
